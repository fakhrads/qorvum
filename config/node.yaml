# Qorvum node configuration
# Run `qv init` to generate this file interactively.
# CLI flags and environment variables always take precedence over values here.
#
# Environment variable equivalents:
#   QORVUM_ROLE, QORVUM_LISTEN, QORVUM_P2P_LISTEN, QORVUM_DATA_DIR,
#   QORVUM_CHANNEL, RUST_LOG, QORVUM_CA_DIR, QORVUM_CA_PASSPHRASE,
#   QORVUM_BOOTSTRAP_PEERS, QORVUM_VALIDATOR_KEYS

org: MyOrg

node:
  role: all                          # all | validator | gateway | peer
  listen: "0.0.0.0:8080"            # REST API listen address
  p2p_listen: "/ip4/0.0.0.0/tcp/7051"
  data_dir: "./data"
  channel: main-channel
  log_level: info                    # trace | debug | info | warn | error

ca:
  dir: "~/.qorvum/ca/myorg"         # path to CA directory (ca.cert, ca.key, crl.json)
  # passphrase: ""                   # prefer QORVUM_CA_PASSPHRASE env var

# Bootstrap peers for multi-node clusters (leave empty for single-node dev)
peers: []
# Example:
# peers:
#   - "/ip4/10.0.0.2/tcp/7051/p2p/<PEER_ID>"

# Hex-encoded Dilithium3 public keys of other validators
validator_keys: []
